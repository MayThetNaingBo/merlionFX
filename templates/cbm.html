<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buy SGD with MMK (CBM Rate)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>.custom-gradient-button {
  font-size: 15px;
  padding: 12px 24px;
  background: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  color: black;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  position: relative;
  overflow: hidden;
  text-decoration: none;
  display: inline-block;
}

.custom-gradient-button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.5s;
}

.custom-gradient-button:hover::before {
  left: 100%;
}

.custom-gradient-button:hover {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
}
.custom-modal-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border-bottom: 3px solid #ddd;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
  text-align: center;
  position: relative;
}

.custom-modal-header .modal-title {
  width: 100%;
  text-align: center;
  font-weight: bold;
}

.custom-modal-header .btn-close {
  position: absolute;
  right: 1rem;
  top: 1rem;
  filter: brightness(0) invert(1); /* makes close icon white */
}
    #alert-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1055;
      width: 100%;
      max-width: 500px;
    }

    .alert.alert-sm {
      padding: 0.4rem 0.75rem;
      font-size: 0.25rem;
      line-height: 1.4;
      border-radius: 6px;
    }

</style>
</head>
<body class="bg-light">
 <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>
<div class="container mt-5">
   <div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">💵 Buy SGD using MMK (via CBM Official Rate)</h3>
  <a href="/services" class="custom-gradient-button">Back to Dashboard</a>
</div>
  
  <form method="POST" action="/process_cbm_order" id="cbmForm">
    <input type="hidden" name="currency" value="SGD">

    <!-- Currency Dropdown (for viewing only) -->
    <div class="mb-3">
      <label class="form-label"><strong>View CBM Exchange Rate</strong></label>
      <select class="form-select" id="currencySelect">
        {% for code in all_rates.keys() %}
          <option value="{{ code }}" {% if code == default_currency %}selected{% endif %}>{{ code }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Rate Display -->
    <div class="mb-3">
      <label class="form-label"><strong>Current Rate</strong> (MMK per 1 unit)</label>
      <input type="text" id="rateDisplay" class="form-control" readonly>
    </div>

    <!-- MMK Amount -->
    <div class="mb-4">
      <label class="form-label"><strong>Amount </strong>(MMK)</label>
      <input type="number" id="mmkAmount" name="mmkAmount" class="form-control" required placeholder="e.g. 50000">
    </div>

    <!-- Hidden real transaction rate -->
    <input type="hidden" name="rate" id="hiddenRate">

    <button type="button" class="custom-gradient-button" id="confirmBtn">Proceed To Payment</button>
  </form>
</div>

<!-- Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      
        <div class="modal-header custom-modal-header w-100 justify-content-center">

          <h5 class="modal-title" id="confirmModalLabel">Confirm MMK Conversion</h5>
          
        </div>
      <div class="modal-body">
        <p><strong>Purchase Amount:</strong> <span id="modalMMK"></span></p>
        <p><strong>Exchange Rate:</strong> <span id="modalRate"></span></p>
        <hr>
        <p><strong>Total Amount (SGD):</strong> <span id="modalTotal" class="fw-bold text-success"></span></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="custom-gradient-button" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="custom-gradient-button" id="finalSubmitBtn">Confirm & Pay</button>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script>
  $(document).ready(function () {
    // Load rate on selection
    $('#currencySelect').on('change', function () {
      const selected = $(this).val();
      $.get("/get_cbm_rate", { currency: selected }, function (data) {
        if (data.rate) {
          $('#rateDisplay').val(data.rate);
        } else {
          $('#rateDisplay').val('');
          alert("Unable to fetch rate.");
        }
      });
    }).trigger('change'); // Load once on page load

    $('#confirmBtn').on('click', function () {
      const selected = $('#currencySelect').val();
      if (selected !== "SGD") {
        showAlert("warning","Sorry! Only MMK → SGD purchase is allowed.");
        return;
      }

      const mmk = parseFloat($('#mmkAmount').val());
      const rate = parseFloat($('#rateDisplay').val());

      if (isNaN(mmk) || isNaN(rate) || mmk <= 0) {
        showAlert("warning","Please enter a valid MMK amount.");
        return;
      }

      const sgd = (mmk / rate).toFixed(2);

      $('#modalMMK').text(`${mmk} MMK`);
      $('#modalRate').text(`1 SGD = ${rate} MMK`);
      $('#modalTotal').text(`SGD ${sgd}`);
      $('#hiddenRate').val(rate);

      new bootstrap.Modal(document.getElementById('confirmModal')).show();
    });

    $('#finalSubmitBtn').on('click', function () {
      $('#cbmForm').submit();
    });
  });

    function showAlert(type, message) {
      const alertContainer = document.getElementById('alert-container');
      const alert = document.createElement('div');

      const icon = {
        success: '✅',
        danger: '❌',
        warning: '⚠️',
        info: 'ℹ️'
      }[type] || '';

      alert.className = `alert alert-${type} alert-dismissible fade show mt-2`;
      alert.setAttribute('role', 'alert');
      alert.innerHTML = `
        <strong>${icon}</strong> ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      `;

      alertContainer.appendChild(alert);

      // Auto-dismiss after 5 seconds
      setTimeout(() => {
        alert.classList.remove('show');
        alert.classList.add('hide');
        setTimeout(() => alert.remove(), 300);
      }, 5000);
    }
  </script>

</body>
</html>

`
